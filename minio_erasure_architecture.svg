<svg width="1400" height="1100" viewBox="0 0 1400 1100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="1100" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#EEF4FF"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1976D2"/>
      <stop offset="1" stop-color="#0D5DB8"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F9FBFF"/>
    </linearGradient>
    <linearGradient id="pillGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2E8AF2"/>
      <stop offset="1" stop-color="#156FD1"/>
    </linearGradient>
    <linearGradient id="setHeader" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1573DA"/>
      <stop offset="1" stop-color="#0B5DBA"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#164E9A" flood-opacity="0.12"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#15355E" flood-opacity="0.10"/>
    </filter>
    <style>
      .title { font: 700 26px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #15355E; }
      .subtitle { font: 600 14px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #E7F2FF; }
      .nodeTitle { font: 700 24px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #1A2C44; }
      .smallLabel { font: 600 13px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #6480A3; letter-spacing: 0.08em; text-transform: uppercase; }
      .pillText { font: 700 22px 'Inter', 'Segoe UI', Arial, sans-serif; fill: white; }
      .sectionTitle { font: 800 30px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #163B67; }
      .setTitle { font: 800 24px 'Inter', 'Segoe UI', Arial, sans-serif; fill: white; }
      .setBody { font: 600 22px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #223A57; }
      .metaText { font: 600 18px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #314A67; }
      .metaLabel { font: 700 18px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #193A63; }
      .badge { font: 700 15px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #1D5AA7; }
    </style>
  </defs>

  <rect width="1400" height="1100" rx="28" fill="url(#bg)"/>

  <!-- Top cluster card -->
  <g filter="url(#shadow)">
    <rect x="440" y="36" width="520" height="90" rx="18" fill="url(#panelGrad)" stroke="#B8D4F7" stroke-width="2"/>
    <!-- cylinder icon -->
    <g transform="translate(472 52)">
      <ellipse cx="28" cy="10" rx="24" ry="10" fill="#2B88ED"/>
      <rect x="4" y="10" width="48" height="36" fill="#1C75DB"/>
      <ellipse cx="28" cy="46" rx="24" ry="10" fill="#1567C8"/>
      <ellipse cx="28" cy="10" rx="24" ry="10" fill="none" stroke="#0E58B5" stroke-width="2"/>
      <path d="M4 10C4 15.5228 14.7452 20 28 20C41.2548 20 52 15.5228 52 10" stroke="#8BC2FF" stroke-width="2" opacity="0.9"/>
      <path d="M4 22C4 27.5228 14.7452 32 28 32C41.2548 32 52 27.5228 52 22" stroke="#8BC2FF" stroke-width="2" opacity="0.9"/>
      <path d="M4 34C4 39.5228 14.7452 44 28 44C41.2548 44 52 39.5228 52 34" stroke="#8BC2FF" stroke-width="2" opacity="0.9"/>
    </g>
    <text x="548" y="77" class="title">MinIO Cluster</text>
    <rect x="752" y="53" width="160" height="34" rx="17" fill="#EAF4FF" stroke="#BDD8FB"/>
    <text x="774" y="75" class="badge">EC Parity: 1</text>
    <text x="548" y="104" style="font: 500 16px 'Inter', 'Segoe UI', Arial, sans-serif; fill:#597595;">Distributed object storage with erasure coding across two nodes</text>
  </g>

  <!-- connector line -->
  <path d="M700 126V164" stroke="#8DB5E8" stroke-width="4" stroke-linecap="round"/>
  <path d="M420 164H980" stroke="#8DB5E8" stroke-width="4" stroke-linecap="round"/>
  <path d="M420 164V186" stroke="#8DB5E8" stroke-width="4" stroke-linecap="round"/>
  <path d="M980 164V186" stroke="#8DB5E8" stroke-width="4" stroke-linecap="round"/>

  <!-- node 1 -->
  <g filter="url(#shadow)">
    <rect x="180" y="186" width="390" height="230" rx="20" fill="url(#panelGrad)" stroke="#BDD8FB" stroke-width="2"/>
    <rect x="180" y="186" width="390" height="54" rx="20" fill="#F2F7FF"/>
    <text x="345" y="221" text-anchor="middle" class="nodeTitle">node1</text>
    <text x="210" y="275" class="smallLabel">Storage drives</text>

    <rect x="210" y="300" width="150" height="50" rx="12" fill="url(#pillGrad)" filter="url(#softShadow)"/>
    <text x="285" y="332" text-anchor="middle" class="pillText">drive1</text>

    <rect x="390" y="300" width="150" height="50" rx="12" fill="url(#pillGrad)" filter="url(#softShadow)"/>
    <text x="465" y="332" text-anchor="middle" class="pillText">drive2</text>

    <rect x="210" y="365" width="150" height="50" rx="12" fill="url(#pillGrad)" filter="url(#softShadow)"/>
    <text x="285" y="397" text-anchor="middle" class="pillText">drive3</text>

    <rect x="390" y="365" width="150" height="50" rx="12" fill="url(#pillGrad)" filter="url(#softShadow)"/>
    <text x="465" y="397" text-anchor="middle" class="pillText">drive4</text>
  </g>

  <!-- node 2 -->
  <g filter="url(#shadow)">
    <rect x="830" y="186" width="390" height="230" rx="20" fill="url(#panelGrad)" stroke="#BDD8FB" stroke-width="2"/>
    <rect x="830" y="186" width="390" height="54" rx="20" fill="#F2F7FF"/>
    <text x="995" y="221" text-anchor="middle" class="nodeTitle">node2</text>
    <text x="860" y="275" class="smallLabel">Storage drives</text>

    <rect x="860" y="300" width="150" height="50" rx="12" fill="url(#pillGrad)" filter="url(#softShadow)"/>
    <text x="935" y="332" text-anchor="middle" class="pillText">drive1</text>

    <rect x="1040" y="300" width="150" height="50" rx="12" fill="url(#pillGrad)" filter="url(#softShadow)"/>
    <text x="1115" y="332" text-anchor="middle" class="pillText">drive2</text>

    <rect x="860" y="365" width="150" height="50" rx="12" fill="url(#pillGrad)" filter="url(#softShadow)"/>
    <text x="935" y="397" text-anchor="middle" class="pillText">drive3</text>

    <rect x="1040" y="365" width="150" height="50" rx="12" fill="url(#pillGrad)" filter="url(#softShadow)"/>
    <text x="1115" y="397" text-anchor="middle" class="pillText">drive4</text>
  </g>

  <!-- arrow -->
  <g>
    <path d="M700 450V505" stroke="#2C7FE4" stroke-width="5" stroke-linecap="round"/>
    <path d="M684 490L700 510L716 490" stroke="#2C7FE4" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- section title -->
  <g>
    <path d="M150 562H485" stroke="#8EB4E4" stroke-width="3" stroke-linecap="round"/>
    <path d="M915 562H1250" stroke="#8EB4E4" stroke-width="3" stroke-linecap="round"/>
    <text x="700" y="572" text-anchor="middle" class="sectionTitle">Erasure Set Layout</text>
  </g>

  <!-- Erasure Set 1 -->
  <g filter="url(#shadow)">
    <rect x="150" y="610" width="1100" height="190" rx="18" fill="url(#panelGrad)" stroke="#BDD8FB" stroke-width="2"/>
    <rect x="150" y="610" width="1100" height="52" rx="18" fill="url(#setHeader)"/>
    <text x="700" y="644" text-anchor="middle" class="setTitle">Erasure Set #1</text>

    <rect x="178" y="690" width="240" height="44" rx="10" fill="#FFFFFF" stroke="#AFCFF7" stroke-width="2"/>
    <text x="298" y="718" text-anchor="middle" class="setBody">node1 / drive1</text>

    <rect x="432" y="690" width="240" height="44" rx="10" fill="#FFFFFF" stroke="#AFCFF7" stroke-width="2"/>
    <text x="552" y="718" text-anchor="middle" class="setBody">node1 / drive2</text>

    <rect x="686" y="690" width="240" height="44" rx="10" fill="#FFFFFF" stroke="#AFCFF7" stroke-width="2"/>
    <text x="806" y="718" text-anchor="middle" class="setBody">node2 / drive1</text>

    <rect x="940" y="690" width="240" height="44" rx="10" fill="#FFFFFF" stroke="#AFCFF7" stroke-width="2"/>
    <text x="1060" y="718" text-anchor="middle" class="setBody">node2 / drive2</text>

    <text x="185" y="762" class="metaLabel">Total Drives:</text>
    <text x="320" y="762" class="metaText">4</text>
    <text x="185" y="788" class="metaLabel">Data Blocks:</text>
    <text x="320" y="788" class="metaText">3</text>
    <text x="185" y="814" class="metaLabel">Parity:</text>
    <text x="260" y="814" class="metaText">1 (EC:1)</text>
  </g>

  <!-- Erasure Set 2 -->
  <g filter="url(#shadow)">
    <rect x="150" y="840" width="1100" height="190" rx="18" fill="url(#panelGrad)" stroke="#BDD8FB" stroke-width="2"/>
    <rect x="150" y="840" width="1100" height="52" rx="18" fill="url(#setHeader)"/>
    <text x="700" y="874" text-anchor="middle" class="setTitle">Erasure Set #2</text>

    <rect x="178" y="920" width="240" height="44" rx="10" fill="#FFFFFF" stroke="#AFCFF7" stroke-width="2"/>
    <text x="298" y="948" text-anchor="middle" class="setBody">node1 / drive3</text>

    <rect x="432" y="920" width="240" height="44" rx="10" fill="#FFFFFF" stroke="#AFCFF7" stroke-width="2"/>
    <text x="552" y="948" text-anchor="middle" class="setBody">node1 / drive4</text>

    <rect x="686" y="920" width="240" height="44" rx="10" fill="#FFFFFF" stroke="#AFCFF7" stroke-width="2"/>
    <text x="806" y="948" text-anchor="middle" class="setBody">node2 / drive3</text>

    <rect x="940" y="920" width="240" height="44" rx="10" fill="#FFFFFF" stroke="#AFCFF7" stroke-width="2"/>
    <text x="1060" y="948" text-anchor="middle" class="setBody">node2 / drive4</text>

    <text x="185" y="992" class="metaLabel">Total Drives:</text>
    <text x="320" y="992" class="metaText">4</text>
    <text x="185" y="1018" class="metaLabel">Data Blocks:</text>
    <text x="320" y="1018" class="metaText">3</text>
    <text x="185" y="1044" class="metaLabel">Parity:</text>
    <text x="260" y="1044" class="metaText">1 (EC:1)</text>
  </g>
</svg>
